baseURL: https://openclaw.github.io/openclaw-book/
title: OpenClaw Book
theme: hugo-book

defaultContentLanguage: zh

enableGitInfo: true

languages:
  zh:
    languageName: 中文
    title: OpenClaw Book
    weight: 1

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 1

menu:
  after:
    - name: "GitHub"
      url: "https://github.com/openclaw/openclaw-book"
      weight: 10

params:
  BookTheme: auto
  BookToC: true
  BookSection: docs
  BookRepo: https://github.com/openclaw/openclaw-book
  BookEditPath: edit/master/content
  BookDateFormat: "2006-01-02"
  BookSearch: true
  BookComments: false
  BookMenuBundle: /menu
